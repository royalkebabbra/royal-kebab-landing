<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,follow" />
  <title>Pagina non trovata | Royal Kebab Center</title>
  <link rel="icon" href="/royal-kebab-landing/images/logo.png" />
  <link rel="stylesheet" href="/royal-kebab-landing/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    .error-content {
      max-width: 36rem;
      margin: 0 auto;
    }

    .error-logo {
      width: 6rem;
      height: auto;
      margin: 0 auto 1.5rem;
    }

    .error-code {
      display: block;
      margin-bottom: 0.75rem;
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }

    .error-title {
      margin-bottom: 1rem;
      font-size: clamp(2.25rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
    }

    .error-text {
      margin: 0 auto 2rem;
      color: var(--fg-70);
      font-size: 1rem;
      line-height: 1.75;
    }
  </style>
</head>
<body>
  <main class="error-page container">
    <div class="error-content">
      <img src="/royal-kebab-landing/images/logo.png" alt="Royal Kebab Center" class="error-logo" width="96" height="126" />
      <span class="error-code">Errore 404</span>
      <h1 class="error-title">Ops! Questa pagina non esiste</h1>
      <p class="error-text">Il link che hai aperto non porta a una pagina disponibile.</p>
      <a href="/royal-kebab-landing/" class="btn-primary">Torna alla Home</a>
    </div>
  </main>
</body>
</html>
